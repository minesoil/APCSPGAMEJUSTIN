<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Survive Teacher Robert</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Top corner menu button -->
  <button id="menuButton">Back to Menu</button>

  <!-- The screen area where images appear -->
  <div id="gameWorld">


    <!--AUDIO TRACKS-->

    <!--background music-->
    <audio id="bgMusic" src="Music/BGM.mp3" loop></audio>

    <!-- When you get caught by teacher robert-->
    <audio id="scareSound" src="Music/Loud Scream Sound Effect 4.mp3"></audio>
    
    <!--Clicking sound for buttons-->
    <audio id ="clickSound" src ="Music/Mouse Click Sound Effect 4.mp3"></audio>

    <!--Arrow Flying Past-->
    <audio id ="arrowSound" src ="Music/Arrow SFX.mp3"></audio>


    <!--LAYERS AND IMAGES-->

    <!--Background Image -->
    <img id="caveBackground" src="Images/Cave.png">

    <!-- Game Characters & Items (Hidden by default until game.js calls them) -->
    <img id="robertImage" src="Images/Robert Background Removed Default.png" class="hidden">
    <img id="lightSwitchImage" src="Images/lightswitch(flippable).png" class="hidden">
    <img id="keypadImage" src="Images/Keypad.png" class="hidden">
    <img id="flamingArrowImage" src="Images/Flaming arrow.png" class="hidden">
    <img id="skullImage" src="Images/skull.png" class="hidden">
    <img id="doorImage" src="Images/door.png" class="hidden">
    <img id="heartImage" src="Images/heart.png" class="hidden">

    <!-- Your first-person view arms -->
    <img id="leftHandImage" src="Images/left hand.png">
    <img id="rightHandImage" src="Images/right hand.png">
  </div>

  <!-- Bottom dialogue box section -->
  <div id="uiPanel">

    <!-- Simple countdown timer graphic line -->
    <div id="timerBar" class="hidden">
      <div id="timerFill"></div>
    </div>

    <!-- Story text readout -->
    <p id="dialogueText">Loading game...</p>

    <!-- Text entry row -->
    <div id="typingArea" class="hidden">
      <input id="typingInput" type="text" placeholder="Type here fast!...">
      <button id="typingButton">SUBMIT</button>
    </div>

    <!-- Simple choice buttons container -->
    <div id="choiceButtons"></div>

  </div>

  <script src="game.js"></script>
</body>

</html>
