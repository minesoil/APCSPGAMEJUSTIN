<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cave</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="gameBody">

  <!-- Top-right menu button to exit the game -->
  <button id="menuButton">Menu</button>

  <!-- The visual stage where all game images live -->
  <div id="gameWorld">

    <!-- Game images. The JavaScript will toggle their display styles to show/hide them -->
    <img id="robertImage" src="Robert Background Removed Default.png" style="display: none;">
    <img id="lightSwitchImage" src="lightswitch(flippable).png" style="display: none;">
    <img id="keypadImage" src="Keypad.png" style="display: none;">
    <img id="flamingArrowImage" src="Flaming arrow.png" style="display: none;">
    <img id="skullImage" src="skull.png" style="display: none;">
    <img id="doorImage" src="door.png" style="display: none;">
    
    <!-- New Interactive Element: Life Saving Heart Display -->
    <img id="heartImage" src="heart.png" style="display: none;">

    <!-- First-person view arms at the bottom -->
    <img id="leftHandImage" src="left hand.png" style="display: block;">
    <img id="rightHandImage" src="right hand.png" style="display: block;">

  </div>

  <!-- The bottom user interface panel -->
  <div id="uiPanel">
    
    <!-- Area displaying current story dialogue text -->
    <p id="dialogueText">Loading story...</p>
    
    <!-- Text typing section (Hidden by default) -->
    <div id="typingArea" style="display: none;">
      <input id="typingInput" type="text" placeholder="Type answer here..." autocomplete="off">
      <button id="typingButton" type="button">Submit</button>
    </div>
    
    <!-- Container where choice choices buttons are dynamically spawned by JS -->
    <div id="choiceButtons"></div>
    
  </div>

  <!-- External game logic script linking -->
  <script src="game.js"></script>
</body>
</html>
